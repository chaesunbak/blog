name: PageSpeed Insights Audit Weekly
on:
  schedule:
    - cron: "0 0 * * 1" # 매주 월요일 00:00에 실행
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  performance-audit:
    name: PSI Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        url_path: ["", "39", "38"]
        strategy: ["mobile", "desktop"]
    steps:
      - name: PageSpeed Insights
        id: psi
        uses: jakepartusch/psi-action@v1.3
        with:
          url: https://${{ vars.BLOG_DOMAIN }}/${{ matrix.url_path }}
          key: ${{ secrets.PSI_API_KEY }}
          strategy: ${{ matrix.strategy }}
          threshold: 1

      - name: Create Summary
        if: always()
        run: |
          echo "## ⚡ PageSpeed Insights Result: ${{ matrix.strategy }}" >> $GITHUB_STEP_SUMMARY
          echo "URL: https://${{ vars.BLOG_DOMAIN }}/${{ matrix.url_path }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 **Performance Score** | **${{ steps.psi.outputs.score }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏱️ Largest Contentful Paint | ${{ steps.psi.outputs.largest-contentful-paint }} ms |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧱 Cumulative Layout Shift | ${{ steps.psi.outputs.cumulative-layout-shift }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⌛ Total Blocking Time | ${{ steps.psi.outputs.total-blocking-time }} ms |" >> $GITHUB_STEP_SUMMARY
          echo "| 📏 First Contentful Paint | ${{ steps.psi.outputs.first-contentful-paint }} ms |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
